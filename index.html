<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMO Memo Generator — Software License</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.25rem; }
  .card.full { grid-column: 1 / -1; }
  label { font-size: 12px; color: #888; display: block; margin-bottom: 6px; }
  input, select, textarea {
    width: 100%; font-family: 'Sarabun', sans-serif; font-size: 14px;
    border: 0.5px solid #ddd; border-radius: 8px; padding: 8px 10px;
    outline: none; background: #fafafa; color: #1a1a1a; transition: border 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color: #888; background: #fff; }
  textarea { resize: vertical; }
  button.primary {
    width: 100%; padding: 12px; font-size: 15px; font-weight: 500;
    font-family: 'Sarabun', sans-serif; background: #1a1a1a; color: #fff;
    border: none; border-radius: 10px; cursor: pointer; margin-top: 4px; transition: opacity 0.2s;
  }
  button.primary:hover { opacity: 0.85; }
  button.secondary {
    flex: 1; padding: 9px; font-size: 13px; font-weight: 500;
    font-family: 'Sarabun', sans-serif; background: #fff; color: #1a1a1a;
    border: 0.5px solid #ddd; border-radius: 8px; cursor: pointer; transition: background 0.2s;
  }
  button.secondary:hover { background: #f5f5f3; }
  .output { display: none; margin-top: 1.5rem; }
  .output-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1.25rem; margin-bottom: 12px; }
  .output-label { font-size: 11px; font-weight: 500; color: #aaa; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .output-text { font-size: 14px; line-height: 1.9; color: #1a1a1a; white-space: pre-wrap; }
  .btn-row { display: flex; gap: 8px; }
  .badge { display: inline-block; font-size: 11px; background: #f0f0ee; color: #555; border-radius: 6px; padding: 2px 8px; margin-bottom: 1rem; }
  @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
</style>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">

  <div class="badge">PMO Internal Tool</div>
  <h1>สร้าง Memo ขอ Software License</h1>
  <p class="subtitle">กรอกข้อมูลด้านล่าง แล้วระบบจะสร้าง memo และ draft email ให้อัตโนมัติ</p>

  <div class="grid">

    <div class="card">
      <label>ชื่อผู้ขอ *</label>
      <input type="text" id="requester" placeholder="เช่น ชื่น สันมณีนิตย์">
    </div>

    <div class="card">
      <label>ชื่อโปรเจกต์</label>
      <input type="text" id="project" placeholder="เช่น PMO Internal Tool">
    </div>

    <div class="card">
      <label>ชื่อ Software *</label>
      <input type="text" id="software" placeholder="เช่น Figma, Jira, Adobe CC">
    </div>

    <div class="card">
      <label>จำนวน License *</label>
      <input type="number" id="qty" placeholder="เช่น 3" min="1">
    </div>

    <div class="card">
      <label>งบประมาณ (บาท)</label>
      <input type="number" id="budget" placeholder="เช่น 15000" min="0">
    </div>

    <div class="card">
      <label>ระยะเวลาที่ต้องการ</label>
      <select id="duration">
        <option value="">-- เลือกระยะเวลา --</option>
        <option>1 เดือน</option>
        <option>3 เดือน</option>
        <option>6 เดือน</option>
        <option>1 ปี</option>
        <option>ถาวร (Perpetual)</option>
      </select>
    </div>

    <div class="card">
      <label>วันที่ขอ</label>
      <input type="date" id="reqdate">
    </div>

    <div class="card">
      <label>Email หัวหน้าผู้ขอ</label>
      <input type="email" id="manager_email" placeholder="manager@company.com">
    </div>

    <div class="card full">
      <label>เหตุผลที่ขอ</label>
      <textarea id="reason" rows="3" placeholder="อธิบายเหตุผลที่ต้องการ license นี้..."></textarea>
    </div>

  </div>

  <button class="primary" onclick="generateMemo()">สร้าง Memo และ Draft Email →</button>

  <div class="output" id="output">

    <div class="output-card">
      <div class="output-label">Memo — Software License Request</div>
      <div class="output-text" id="memo-content"></div>
    </div>

    <div class="output-card">
      <div class="output-label">Draft Email</div>
      <div class="output-text" id="email-content"></div>
    </div>

    <div class="btn-row">
      <button class="secondary" onclick="copyText('memo-content', this)">คัดลอก Memo</button>
      <button class="secondary" onclick="copyText('email-content', this)">คัดลอก Email</button>
    </div>

  </div>

</div>

<script>
  document.getElementById('reqdate').valueAsDate = new Date();

  function val(id) { return document.getElementById(id).value.trim(); }

  function generateMemo() {
    const requester = val('requester');
    const project = val('project');
    const software = val('software');
    const qty = val('qty');
    const budget = val('budget');
    const duration = val('duration');
    const reason = val('reason');
    const reqdate = val('reqdate');
    const managerEmail = val('manager_email');

    if (!requester || !software || !qty) {
      alert('กรุณากรอกชื่อผู้ขอ, ชื่อ Software และจำนวน License ก่อนนะคะ');
      return;
    }

    const dateStr = reqdate
      ? new Date(reqdate).toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' })
      : new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });

    const budgetStr = budget ? parseInt(budget).toLocaleString('th-TH') + ' บาท' : '-';

    const memo =
`บันทึกข้อความ
เรื่อง: ขออนุมัติ Software License — ${software}
วันที่: ${dateStr}
ผู้ขอ: ${requester}${project ? '\nโปรเจกต์: ' + project : ''}

รายละเอียดการขอ:
• Software: ${software}
• จำนวน License: ${qty} ใบอนุญาต
• ระยะเวลา: ${duration || '-'}
• งบประมาณ: ${budgetStr}

เหตุผล:
${reason || '-'}

จึงเรียนมาเพื่อขออนุมัติ
${requester}`;

    const email =
`เรียน ทีม PMO${managerEmail ? ' และหัวหน้าผู้ขอ' : ''},

แจ้งการขออนุมัติ Software License ดังรายละเอียดด้านล่าง

ผู้ขอ: ${requester}
Software: ${software}
จำนวน: ${qty} license
ระยะเวลา: ${duration || '-'}
งบประมาณ: ${budgetStr}
เหตุผล: ${reason || '-'}

กรุณาตรวจสอบและอนุมัติภายใน 3 วันทำการ

ขอบคุณค่ะ/ครับ
${requester}

---
[draft อัตโนมัติจาก PMO Memo Generator]`;

    document.getElementById('memo-content').innerText = memo;
    document.getElementById('email-content').innerText = email;
    document.getElementById('output').style.display = 'block';
    document.getElementById('output').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function copyText(id, btn) {
    const text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.innerText;
      btn.innerText = 'คัดลอกแล้ว ✓';
      setTimeout(() => btn.innerText = orig, 2000);
    });
  }
</script>
</body>
</html>
